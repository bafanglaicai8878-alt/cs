<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理后台登录</title>
  <link rel="stylesheet" href="/static/theme.css" />
  <style>
    :root {
      --bg: #f0f2f8; --primary: #6366f1; --primary-dark: #4f46e5;
      --text: #1e293b; --muted: #64748b; --border: #e2e8f0; --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .wrap { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; }
    .brand {
      background: linear-gradient(145deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      color: #fff; padding: 48px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden;
    }
    .brand::before {
      content: ""; position: absolute; width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(74,156,237,.25) 0%, transparent 70%);
      top: -100px; right: -100px;
    }
    .brand h1, .brand p, .brand ul { position: relative; }
    .brand h1 { font-size: 32px; margin-bottom: 12px; }
    .brand p { color: #94a3b8; max-width: 360px; line-height: 1.6; }
    .brand ul { margin-top: 28px; list-style: none; }
    .brand li { padding: 10px 0; color: #cbd5e1; display: flex; align-items: center; gap: 10px; }
    .brand li::before { content: ""; width: 6px; height: 6px; background: var(--primary); border-radius: 50%; }
    .form-wrap { display: flex; align-items: center; justify-content: center; padding: 32px; }
    .box { width: 100%; max-width: 380px; }
    .box h2 { font-size: 24px; margin-bottom: 8px; }
    .box .sub { color: var(--muted); margin-bottom: 28px; font-size: 14px; }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px;
      font-size: 14px; background: #fff;
    }
    .field input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(74,156,237,.15); }
    .pwd-wrap { position: relative; }
    .pwd-wrap input { padding-right: 52px; }
    .pwd-wrap button {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      border: none; background: none; color: var(--muted); cursor: pointer; font-size: 12px;
    }
    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 10px; background: var(--primary);
      color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn:hover { background: var(--primary-dark); }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .err { color: var(--danger); font-size: 13px; margin-top: 14px; display: none; }
    .hint { font-size: 12px; color: var(--muted); margin-top: 18px; text-align: center; }
    .foot { margin-top: 16px; text-align: center; font-size: 13px; color: var(--muted); }
    .foot a { color: var(--primary-dark); text-decoration: none; }
    .foot a:hover { text-decoration: underline; }
    @media (max-width: 900px) {
      .wrap { grid-template-columns: 1fr; }
      .brand { display: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <h1 id="siteName">CS Steam 管理台</h1>
      <p>一站式 CDK 生成、代理分销与用户激活管理</p>
      <ul>
        <li>搜索游戏，批量生成 CDK</li>
        <li>代理余额管理，独立数据统计</li>
        <li>远程 PowerShell 一键激活</li>
      </ul>
    </div>
    <div class="form-wrap">
      <div class="box">
        <h2>管理后台</h2>
        <p class="sub">请使用管理员账号登录</p>
        <div class="field"><label>用户名</label><input id="loginUser" autocomplete="username" placeholder="管理员用户名" /></div>
        <div class="field">
          <label>密码</label>
          <div class="pwd-wrap">
            <input id="loginPass" type="password" autocomplete="current-password" placeholder="密码" />
            <button type="button" onclick="togglePwd()">显示</button>
          </div>
        </div>
        <button class="btn" id="loginBtn" onclick="doLogin()">登 录</button>
        <p class="err" id="loginErr"></p>
        <p class="foot">代理账号请前往 <a href="/login">代理前台登录</a></p>
      </div>
    </div>
  </div>
  <script>
    const TOKEN_KEY = "admin_token";

    function togglePwd() {
      const input = document.getElementById("loginPass");
      input.type = input.type === "password" ? "text" : "password";
    }

    async function doLogin() {
      const username = document.getElementById("loginUser").value.trim();
      const password = document.getElementById("loginPass").value;
      const errEl = document.getElementById("loginErr");
      errEl.style.display = "none";
      document.getElementById("loginBtn").disabled = true;
      try {
        const d = await fetch("/api/admin/login", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        }).then(r => r.json());
        if (!d.ok) {
          errEl.textContent = d.message || "登录失败";
          errEl.style.display = "block";
          return;
        }
        if (d.user.role === "agent") {
          errEl.textContent = "代理请使用前台登录 /login";
          errEl.style.display = "block";
          return;
        }
        if (d.user.role !== "superadmin") {
          errEl.textContent = "无权登录管理后台";
          errEl.style.display = "block";
          return;
        }
        localStorage.removeItem("portal_token");
        localStorage.setItem(TOKEN_KEY, d.token);
        if (d.site_name) localStorage.setItem("admin_site_name", d.site_name);
        location.replace("/admin");
      } finally {
        document.getElementById("loginBtn").disabled = false;
      }
    }

    (function init() {
      fetch("/api/admin/settings", { credentials: "same-origin" })
        .then(r => r.json())
        .then(d => {
          if (d.ok && d.site_name) document.getElementById("siteName").textContent = d.site_name;
        })
        .catch(() => {});
      const token = localStorage.getItem(TOKEN_KEY);
      if (!token) return;
      fetch("/api/admin/me", { credentials: "same-origin", headers: { Authorization: "Bearer " + token } })
        .then(r => r.json())
        .then(d => {
          if (!d.ok) return;
          if (d.user.role === "superadmin") location.href = "/admin";
          else if (d.user.role === "agent") {
            localStorage.removeItem(TOKEN_KEY);
            localStorage.setItem("portal_token", token);
            location.href = "/portal";
          }
        })
        .catch(() => {});
    })();

    document.getElementById("loginPass").addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });
  </script>
</body>
</html>
