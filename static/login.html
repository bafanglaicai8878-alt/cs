l<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>代理登录</title>
  <style>
    :root {
      --bg: #eef1f6; --primary: #4a9ced; --primary-dark: #2d7fd4;
      --text: #1e293b; --muted: #64748b; --border: #e2e8f0; --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .wrap { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; }
    .brand {
      background: linear-gradient(145deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      color: #fff; padding: 48px; display: flex; flex-direction: column; justify-content: center;
    }
    .brand h1 { font-size: 32px; margin-bottom: 12px; }
    .brand p { color: #94a3b8; max-width: 360px; line-height: 1.6; }
    .brand ul { margin-top: 28px; list-style: none; }
    .brand li { padding: 10px 0; color: #cbd5e1; display: flex; align-items: center; gap: 10px; }
    .brand li::before { content: ""; width: 6px; height: 6px; background: var(--primary); border-radius: 50%; }
    .form-wrap { display: flex; align-items: center; justify-content: center; padding: 32px; }
    .box { width: 100%; max-width: 380px; }
    .box h2 { font-size: 24px; margin-bottom: 8px; }
    .box .sub { color: var(--muted); margin-bottom: 28px; font-size: 14px; }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px;
      font-size: 14px; background: #fff;
    }
    .field input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(74,156,237,.15); }
    .btn {
      width: 100%; padding: 12px; border: none; border-radius: 10px; background: var(--primary);
      color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .btn:hover { background: var(--primary-dark); }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .err { color: var(--danger); font-size: 13px; margin-top: 14px; display: none; }
    .foot { margin-top: 24px; text-align: center; font-size: 13px; color: var(--muted); }
    .foot a { color: var(--primary-dark); text-decoration: none; }
    .foot a:hover { text-decoration: underline; }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #065f46; color: #fff; padding: 10px 18px; border-radius: 999px; opacity: 0; transition: .25s;
    }
    .toast.show { opacity: 1; }
    @media (max-width: 900px) {
      .wrap { grid-template-columns: 1fr; }
      .brand { display: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <h1>代理工作台</h1>
      <p>面向代理账号：生成 CDK、管理下级、查看分润与激活记录。</p>
      <ul>
        <li>搜索游戏并批量生成 CDK</li>
        <li>邀请下级代理并设置成本价</li>
        <li>查看余额与分润入账</li>
      </ul>
    </div>
    <div class="form-wrap">
      <div class="box">
        <h2>代理登录</h2>
        <p class="sub">请使用代理账号登录前台</p>
        <div class="field"><label>用户名</label><input id="loginUser" autocomplete="username" placeholder="代理用户名" /></div>
        <div class="field"><label>密码</label><input id="loginPass" type="password" autocomplete="current-password" placeholder="密码" /></div>
        <button class="btn" id="loginBtn" onclick="doLogin()">登 录</button>
        <p class="err" id="loginErr"></p>
        <p class="foot"><span style="font-size:12px">有邀请码？请使用上级分享的 <a href="/register">注册链接</a></span></p>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <script>
    const TOKEN_KEY = "portal_token";

    function getNextUrl() {
      const next = new URLSearchParams(location.search).get("next");
      if (next && next.startsWith("/") && !next.startsWith("//")) return next;
      return "/portal";
    }

    function toast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 2200);
    }

    async function doLogin() {
      const username = document.getElementById("loginUser").value.trim();
      const password = document.getElementById("loginPass").value;
      const errEl = document.getElementById("loginErr");
      errEl.style.display = "none";
      document.getElementById("loginBtn").disabled = true;
      try {
        const d = await fetch("/api/admin/login", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        }).then(r => r.json());
        if (!d.ok) {
          errEl.textContent = d.message || "登录失败";
          errEl.style.display = "block";
          return;
        }
        if (d.user.role === "superadmin") {
          toast("正在跳转管理后台…");
          localStorage.removeItem(TOKEN_KEY);
          localStorage.setItem("admin_token", d.token);
          location.href = "/admin";
          return;
        }
        if (d.user.role !== "agent") {
          errEl.textContent = "仅代理账号可登录此前台";
          errEl.style.display = "block";
          return;
        }
        localStorage.removeItem("admin_token");
        localStorage.setItem(TOKEN_KEY, d.token);
        location.replace(getNextUrl());
      } finally {
        document.getElementById("loginBtn").disabled = false;
      }
    }

    (function checkAlreadyLoggedIn() {
      const token = localStorage.getItem(TOKEN_KEY);
      const opts = { credentials: "same-origin" };
      if (token) opts.headers = { Authorization: "Bearer " + token };
      fetch("/api/admin/me", opts)
        .then(r => r.json())
        .then(d => { if (d.ok && d.user.role === "agent") location.href = getNextUrl(); })
        .catch(() => {});
    })();

    document.getElementById("loginPass").addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });
  </script>
</body>
</html>
